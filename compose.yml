services:
  redis:
    container_name: L1-redis
    image: redis:7-alpine
    user: root
    command: >
      sh -c 'mkdir -p /run/redis &&
             chmod 777 /run/redis &&
             exec redis-server --unixsocket /run/redis/redis.sock --unixsocketperm 777'
    volumes:
      - redis-socket:/run/redis
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -s /run/redis/redis.sock ping | grep PONG"]
      interval: 2s
      timeout: 1s
      retries: 15

  dash:
    container_name: L1-web-application
    build: 
      context: .
      dockerfile: L1-web-application/Dockerfile
    ports:
      - "${PORT}:${PORT}"
    environment:
      - HOST=${HOST}
      - PORT=${PORT}
      - SOCK=${SOCK}
    volumes:
      - sqlite-db:/app/database/sqlite
      - redis-socket:/run/redis
    depends_on:
      redis:
        condition: service_healthy

  testing_stream:
    container_name: L1-testing-redis-stream_writer
    build: L1-testing-redis-stream-writer/
    environment:
      - SOCK=${SOCK}
    volumes:
      - redis-socket:/run/redis
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    container_name: L1-celery-worker
    build: 
      context: .
      dockerfile: L1-celery-worker/Dockerfile
    environment:
      - SOCK=${SOCK}
      - DB_PATH=${DB_PATH}
    volumes:
      - redis-socket:/run/redis
    depends_on:
      redis:
        condition: service_healthy

volumes:
  sqlite-db:
  redis-socket:
